<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Moody Magic 8-Ball</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 50px; }
        .container { max-width: 500px; margin: auto; background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 2px solid #0f3460; }
        #ball { width: 150px; height: 150px; background: radial-gradient(circle at 30% 30%, #333, #000); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; border: 8px solid #333; transition: transform 0.1s; }
        #display { font-size: 1.2rem; font-weight: bold; color: #e94560; min-height: 50px; margin-top: 20px; }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff4d6d; }
        .history-box { margin-top: 30px; text-align: left; background: #0f3460; padding: 15px; border-radius: 10px; font-size: 0.9rem; }
        ul { list-style-type: "🔮 "; padding-left: 20px; }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(1px, 1px); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 Moody 8-Ball</h1>
    <input type="text" id="userInput" placeholder="Ask your question here...">
    <br>
    <button onclick="askTheBall()">Ask the Spirits</button>

    <div id="ball">
        <div style="color: white; font-size: 40px;">8</div>
    </div>

    <div id="display">Waiting for a question...</div>

    <div class="history-box">
        <strong>History Log (The Memory):</strong>
        <ul id="historyList"></ul>
    </div>
</div>

<script>
    const answers = ["Yes!", "No way.", "Ask me later.", "Maybe...", "Definitely!", "Highly Unlikely."];
    const history = []; 
    let clickCount = 0; 

    function askTheBall() {
        const input = document.getElementById("userInput");
        const display = document.getElementById("display");
        const historyList = document.getElementById("historyList");
        const ballElement = document.getElementById("ball");
        
        const question = input.value;

        // --- 1. IF / ELSE (The Gatekeeper) ---
        if (question.length === 0) {
            display.innerText = "Error: You must speak to the ball!";
            return;
        } else if (question.length < 5) {
            display.innerText = "That's too short! Be more specific.";
            return;
        }

        // Visual "Shake" Effect using CSS class
        ballElement.classList.add("shake");

        // --- 2. WHILE LOOP (The Processing Power) ---
        let thinkingTime = 500000; // Large number to simulate "work"
        while (thinkingTime > 0) {
            thinkingTime--; 
        }

        // Stop shaking after the "work" is done
        setTimeout(() => {
            ballElement.classList.remove("shake");

            // Pick a random answer
            let randomIndex = Math.floor(Math.random() * answers.length);
            let currentResponse = answers[randomIndex];

            // --- 3. LOGIC: MOOD TRACKER ---
            clickCount++;
            if (clickCount > 7) {
                display.innerText = "I'm tired! Stop clicking me!";
            } else {
                display.innerText = currentResponse;
                history.push(question + " -> " + currentResponse);
            }

            // --- 4. FOR LOOP (The History Rebuilder) ---
            historyList.innerHTML = ""; // Clear list
            for (let i = 0; i < history.length; i++) {
                let listItem = document.createElement("li");
                listItem.innerText = history[i];
                historyList.appendChild(listItem);
            }
            
            input.value = ""; // Clear input for next question
        }, 500); 
    }
</script>

</body>
</html>
